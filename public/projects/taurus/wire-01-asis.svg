    <rect x="58" y="239" width="52" height="8" rx="4"/><rect x="150" y="239" width="70" height="8" rx="4"/><rect x="260" y="239" width="60" height="8" rx="4"/><rect x="360" y="239" width="40" height="8" rx="4"/><rect x="450" y="239" width="50" height="8" rx="4"/><rect x="540" y="239" width="44" height="8" rx="4"/>
